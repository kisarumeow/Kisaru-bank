<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Империя Кисару Банк</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #8A2BE2;
      --primary-light: #9B59B6;
      --primary-dark: #6A1B9A;
      --bg: #0a0a14;
      --surface: rgba(20, 20, 35, 0.7);
      --surface2: rgba(30, 30, 50, 0.7);
      --text: #e0d9f5;
      --text2: #9b8ec4;
      --danger: #e0556a;
      --success: #3ecf8e;
      --info: #5b9cf5;
      --border: rgba(138, 43, 226, 0.25);
      --shadow: 0 8px 32px rgba(138, 43, 226, 0.15);
      --radius: 20px;
      --btn-radius: 14px;
      --font-size: 16px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.light {
      --bg: #f0eef7;
      --surface: rgba(255, 255, 255, 0.85);
      --surface2: rgba(245, 245, 255, 0.85);
      --text: #1a1a2e;
      --text2: #5a5a7a;
      --border: rgba(138, 43, 226, 0.3);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-size: var(--font-size); transition: background var(--transition), color var(--transition); }
    #app { width: 100%; max-width: 100%; min-height: 100vh; background: transparent; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    body.pc-mode #app { max-width: 1200px; margin: 0 auto; flex-direction: row; }
    .screen { display: none; flex: 1; padding: 16px; overflow-y: auto; }
    .screen.active { display: flex; flex-direction: column; }
    body.pc-mode .screen { padding: 20px 30px; }
    .glass-card {
      background: rgba(20, 20, 40, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
    }
    body.light .glass-card { background: rgba(255, 255, 255, 0.75); }
    .btn {
      padding: 12px 20px; border: none; border-radius: var(--btn-radius); font-weight: 600; font-family: inherit; font-size: 0.9rem;
      cursor: pointer; transition: all var(--transition); background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 4px 16px rgba(138, 43, 226, 0.3);
    }
    .btn:active { transform: scale(0.97); }
    .btn.secondary { background: var(--surface2); color: var(--text); box-shadow: none; }
    .btn.danger { background: linear-gradient(135deg, #e0556a, #c0392b); }
    .btn.small { padding: 6px 12px; font-size: 0.8rem; }
    .tab-bar {
      display: flex; overflow-x: auto; gap: 4px; padding: 8px 0; background: var(--surface); backdrop-filter: blur(24px);
      border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 0.6rem; font-weight: 600;
      color: var(--text2); cursor: pointer; padding: 6px 10px; border-radius: 12px; transition: all var(--transition);
      min-width: 56px; text-align: center;
    }
    .tab-item i { font-size: 1.2rem; }
    .tab-item.active { color: var(--primary); background: rgba(138, 43, 226, 0.2); }
    body.pc-mode .tab-bar { display: none; }
    .pc-sidebar {
      display: none; width: 260px; background: var(--surface); backdrop-filter: blur(20px); border-right: 1px solid var(--border);
      flex-direction: column; padding: 20px 10px; overflow-y: auto; height: 100vh; position: sticky; top: 0;
    }
    body.pc-mode .pc-sidebar { display: flex; }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all var(--transition);
      color: var(--text2); font-weight: 500;
    }
    .sidebar-item i { width: 24px; text-align: center; }
    .sidebar-item.active { color: var(--primary); background: rgba(138, 43, 226, 0.2); }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary-dark); color: #fff;
      padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; z-index: 300; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface); backdrop-filter: blur(24px); border-radius: 24px; padding: 24px; width: 90%; max-width: 420px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  const LS = {
    users: 'bank_users',
    data: 'bank_usersData',
    device: 'device_type',
    remember: 'rememberedUser',
    promos: 'promocodes',
    resetFlag: 'kisaru_reset_done',
    support: 'supportTickets',
    currentUser: null,
    appData: null,
    timers: [],
    currentTab: 'home',
    sessionStart: Date.now(),
  };

  function initApp() {
    loadData();
    if (!localStorage.getItem(LS.device)) {
      renderDeviceChoice();
    } else {
      checkAutoLogin();
    }
  }

  function loadData() {
    let users = JSON.parse(localStorage.getItem(LS.users) || '[]');
    let usersData = JSON.parse(localStorage.getItem(LS.data) || '{}');
    if (!users.find(u => u.login === 'kisaru')) {
      users.push({ login: 'kisaru', passwordHash: btoa('kisaru123') });
      usersData['kisaru'] = createOwnerData();
    }
    if (!localStorage.getItem(LS.resetFlag)) {
      usersData['kisaru'] = createOwnerData();
      localStorage.setItem(LS.resetFlag, 'true');
    }
    LS.appData = { users, usersData, cryptoPrices: { KSUR: 12.5, MEC: 4.2, CLAW: 0.85 }, cryptoHistory: { KSUR: [], MEC: [], CLAW: [] }, lastPriceUpdate: Date.now(), promocodes: JSON.parse(localStorage.getItem(LS.promos) || '{}'), supportTickets: JSON.parse(localStorage.getItem(LS.support) || '{}') };
    saveFullData();
  }

  function createOwnerData() {
    return { balance: 0, clickPower: 1, upgradesPurchased: {}, totalClicks: 0, totalEarned: 0, level: 1, friends: [], friendRequests: {incoming:[],outgoing:[]}, chats: {}, displayName: 'Kisaru', nicknameColor: '#FFD700', avatar: '👑', description: '', lastNicknameChange: null, totalTimeSpent: 0, settings: { theme:'dark', fontSize:16, animations:true, greeting:'' }, activeLoans: [], deposits: [], cryptoWallet: {KSUR:0,MEC:0,CLAW:0}, orders: [], transactionsHistory: [], };
  }

  function saveFullData() {
    localStorage.setItem(LS.users, JSON.stringify(LS.appData.users));
    localStorage.setItem(LS.data, JSON.stringify(LS.appData.usersData));
    localStorage.setItem(LS.promos, JSON.stringify(LS.appData.promocodes));
    localStorage.setItem(LS.support, JSON.stringify(LS.appData.supportTickets));
  }

  function getCurrentUserData() { return LS.currentUser ? LS.appData.usersData[LS.currentUser] : null; }

  function renderDeviceChoice() {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:30px;">
        <h2>С какого устройства вы сидите?</h2>
        <button class="btn" onclick="selectDevice('phone')"><i class="fa-solid fa-mobile-screen"></i> Телефон</button>
        <button class="btn" onclick="selectDevice('pc')"><i class="fa-solid fa-desktop"></i> ПК</button>
      </div>`;
  }
  window.selectDevice = function(type) {
    localStorage.setItem(LS.device, type);
    if (type === 'pc') document.body.classList.add('pc-mode');
    else document.body.classList.remove('pc-mode');
    checkAutoLogin();
  };

  function checkAutoLogin() {
    const remembered = localStorage.getItem(LS.remember);
    if (remembered && LS.appData.usersData[remembered]) {
      loginUser(remembered, true);
    } else {
      renderAuthScreen();
    }
  }

  function renderAuthScreen() {
    document.getElementById('app').innerHTML = `
      <div class="auth-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;">
        <div id="logoArea" style="text-align:center;margin-bottom:30px;">
          <i class="fa-solid fa-crown" style="font-size:3rem;color:var(--primary);"></i>
          <h2>Империя Кисару Банк</h2>
        </div>
        <div class="glass-card" style="width:100%;max-width:360px;">
          <div style="display:flex;gap:8px;margin-bottom:16px;">
            <button class="btn small" onclick="switchAuthTab('login')">Вход</button>
            <button class="btn small secondary" onclick="switchAuthTab('register')">Регистрация</button>
          </div>
          <div id="authFormContainer"></div>
          <div style="text-align:center;margin-top:12px;"><a href="#" onclick="showForgotPassword()">Забыли пароль?</a></div>
          ${localStorage.getItem(LS.remember) ? `<button class="btn secondary" onclick="quickLogin()" style="margin-top:12px;width:100%;">Захожу не первый раз</button>` : ''}
        </div>
      </div>`;
    switchAuthTab('login');
  }

  window.switchAuthTab = function(tab) {
    const container = document.getElementById('authFormContainer');
    if (tab === 'login') {
      container.innerHTML = `<form onsubmit="handleLogin(event)"><input name="login" placeholder="Логин" required><input type="password" name="password" placeholder="Пароль" required><label><input type="checkbox" name="remember"> Запомнить меня</label><button type="submit" class="btn">Войти</button></form>`;
    } else {
      container.innerHTML = `<form onsubmit="handleRegister(event)"><input name="login" placeholder="Логин" required><input type="password" name="password" placeholder="Пароль" required><input type="password" name="confirm" placeholder="Подтверждение" required><button type="submit" class="btn">Зарегистрироваться</button></form>`;
    }
  };

  window.handleLogin = function(e) {
    e.preventDefault();
    const login = e.target.login.value.trim().toLowerCase();
    const pw = e.target.password.value;
    const remember = e.target.remember.checked;
    const user = LS.appData.users.find(u => u.login === login);
    if (!user || user.passwordHash !== btoa(pw)) return showToast('Неверный логин или пароль');
    if (remember) localStorage.setItem(LS.remember, login);
    else localStorage.removeItem(LS.remember);
    loginUser(login, false);
  };

  window.handleRegister = function(e) {
    e.preventDefault();
    const login = e.target.login.value.trim().toLowerCase();
    const pw = e.target.password.value;
    if (pw !== e.target.confirm.value) return showToast('Пароли не совпадают');
    if (LS.appData.users.find(u => u.login === login)) return showToast('Логин занят');
    LS.appData.users.push({ login, passwordHash: btoa(pw) });
    LS.appData.usersData[login] = createNewUserData();
    saveFullData();
    loginUser(login, false);
  };

  window.quickLogin = function() {
    const login = localStorage.getItem(LS.remember);
    if (login && LS.appData.usersData[login]) loginUser(login, true);
    else showToast('Нет сохранённых данных');
  };

  function loginUser(login, isAuto) {
    LS.currentUser = login;
    if (!LS.appData.usersData[login]) LS.appData.usersData[login] = createNewUserData();
    LS.sessionStart = Date.now();
    saveFullData();
    renderMainUI();
    if (!isAuto) showGreeting();
    startTimers();
  }

  function createNewUserData() {
    return {
      balance: 0, clickPower: 1, upgradesPurchased: {}, totalClicks: 0, totalEarned: 0, level: 1,
      friends: [], friendRequests: {incoming:[],outgoing:[]}, chats: {},
      displayName: '', nicknameColor: '#8A2BE2', avatar: '😺', description: '', lastNicknameChange: null,
      totalTimeSpent: 0, settings: { theme:'dark', fontSize:16, animations:true, greeting:'' },
      activeLoans: [], deposits: [], cryptoWallet: {KSUR:0,MEC:0,CLAW:0}, orders: [], transactionsHistory: [],
    };
  }

  function showGreeting() {
    const hour = new Date().getHours();
    let greet = 'Здравствуйте';
    if (hour < 6) greet = 'Доброй ночи';
    else if (hour < 12) greet = 'Доброе утро';
    else if (hour < 18) greet = 'Добрый день';
    else greet = 'Добрый вечер';
    const data = getCurrentUserData();
    const name = data.settings.greeting || data.displayName || LS.currentUser;
    fetch('https://api.thecatapi.com/v1/images/search')
      .then(r => r.json()).then(d => {
        const url = d[0]?.url;
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.background = `rgba(0,0,0,0.4) url(${url}) center/cover no-repeat`;
        overlay.innerHTML = `<div class="modal" style="background:rgba(0,0,0,0.6);color:#fff;"><h2>${greet}, ${name}!</h2><button class="btn" onclick="this.parentElement.parentElement.remove()">Продолжить</button></div>`;
        document.body.appendChild(overlay);
        setTimeout(() => overlay.remove(), 5000);
      }).catch(() => {});
  }

  function renderMainUI() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="pc-sidebar" id="sidebar"></div>
      <div style="flex:1;display:flex;flex-direction:column;">
        <div id="tabContent" class="screen active"></div>
        <div class="tab-bar" id="tabBar"></div>
      </div>`;
    const tabs = [
      {id:'home', icon:'fa-house', label:'Главная'},
      {id:'clicker', icon:'fa-paw', label:'Кликер'},
      {id:'transfer', icon:'fa-arrow-right-arrow-left', label:'Переводы'},
      {id:'loans', icon:'fa-coins', label:'Кредиты'},
      {id:'deposits', icon:'fa-piggy-bank', label:'Вклады'},
      {id:'crypto', icon:'fa-chart-line', label:'Крипта'},
      {id:'friends', icon:'fa-user-group', label:'Друзья'},
      {id:'chats', icon:'fa-comments', label:'Чаты'},
      {id:'leaderboard', icon:'fa-trophy', label:'Топ'},
      {id:'profile', icon:'fa-user', label:'Профиль'},
      {id:'settings', icon:'fa-gear', label:'Настройки'},
      {id:'promo', icon:'fa-gift', label:'Промокоды'}
    ];
    const bar = document.getElementById('tabBar');
    const sidebar = document.getElementById('sidebar');
    tabs.forEach(t => {
      bar.innerHTML += `<div class="tab-item" data-tab="${t.id}"><i class="fa-solid ${t.icon}"></i><span>${t.label}</span></div>`;
      sidebar.innerHTML += `<div class="sidebar-item" data-tab="${t.id}"><i class="fa-solid ${t.icon}"></i>${t.label}</div>`;
    });
    document.querySelectorAll('.tab-item, .sidebar-item').forEach(el => el.addEventListener('click', (e) => {
      const tab = e.currentTarget.dataset.tab;
      switchTab(tab);
    }));
    switchTab('home');
  }

  function switchTab(tab) {
    LS.currentTab = tab;
    document.querySelectorAll('.tab-item, .sidebar-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[data-tab="${tab}"]`).forEach(el => el.classList.add('active'));
    renderTabContent(tab);
  }

  function renderTabContent(tab) {
    const content = document.getElementById('tabContent');
    if (!content) return;
    switch(tab) {
      case 'home': renderHome(content); break;
      case 'clicker': renderClicker(content); break;
      case 'transfer': renderTransfer(content); break;
      case 'loans': renderLoans(content); break;
      case 'deposits': renderDeposits(content); break;
      case 'crypto': renderCrypto(content); break;
      case 'friends': renderFriends(content); break;
      case 'chats': renderChats(content); break;
      case 'leaderboard': renderLeaderboard(content); break;
      case 'profile': renderProfile(content); break;
      case 'settings': renderSettings(content); break;
      case 'promo': renderPromo(content); break;
    }
  }

  function renderHome(container) {
    const d = getCurrentUserData();
    container.innerHTML = `<h2>👑 Империя Кисару Банк</h2><div class="glass-card"><div class="balance">${d.balance.toFixed(2)} ₥</div></div>`;
  }

  function renderClicker(container) {
    const d = getCurrentUserData();
    container.innerHTML = `
      <h2>Кликер</h2>
      <div class="glass-card" style="text-align:center;">
        <div class="clicker-btn" onclick="handleClickerClick()">💰 Начислить меулы</div>
        <div>Сила клика: ${d.clickPower}</div>
      </div>
      <div class="glass-card">
        <h3>Улучшения</h3>
        ${['power1','power2','double','autoclick'].map(k => `<div><span>${k}</span><button class="btn small buy-upgrade" data-key="${k}">Купить</button></div>`).join('')}
      </div>`;
  }
  window.handleClickerClick = function() {
    const d = getCurrentUserData();
    d.balance += d.clickPower; d.totalEarned += d.clickPower; d.totalClicks++;
    saveFullData();
    renderTabContent('clicker');
  };

  function renderTransfer(container) { container.innerHTML = '<h2>Переводы</h2><p>В разработке</p>'; }
  function renderLoans(container) { container.innerHTML = '<h2>Кредиты</h2><p>В разработке</p>'; }
  function renderDeposits(container) { container.innerHTML = '<h2>Вклады</h2><p>В разработке</p>'; }
  function renderCrypto(container) { container.innerHTML = '<h2>Крипта</h2><p>В разработке</p>'; }
  function renderFriends(container) {
    container.innerHTML = `
      <h2>Друзья</h2>
      <input id="friendSearch" placeholder="Логин друга"><button onclick="searchFriend()">Найти</button>
      <div id="searchResult"></div>
      <div id="friendsList"></div>`;
  }
  window.searchFriend = function() {
    const login = document.getElementById('friendSearch').value.trim().toLowerCase();
    const user = LS.appData.users.find(u => u.login === login);
    const res = document.getElementById('searchResult');
    if (!user) return res.innerHTML = 'Пользователь не найден';
    res.innerHTML = `<div class="glass-card">${login} <button onclick="sendFriendRequest('${login}')">Добавить</button></div>`;
  };
  window.sendFriendRequest = function(login) { /* реализация */ };

  function renderChats(container) {
    container.innerHTML = `<h2>Чаты</h2><div id="chatList"></div>`;
  }
  function renderLeaderboard(container) { container.innerHTML = '<h2>Лидерборд</h2>'; }
  function renderProfile(container) {
    container.innerHTML = `<h2>Профиль</h2><button onclick="viewMyProfile()">Посмотреть профиль</button>`;
  }
  function renderSettings(container) { container.innerHTML = '<h2>Настройки</h2><p>10 пунктов</p>'; }
  function renderPromo(container) { container.innerHTML = '<h2>Промокоды</h2><input id="promoInput"><button onclick="activatePromo()">Активировать</button>'; }

  function showToast(msg) { /* ... */ }
  function showForgotPassword() { /* ... */ }

  initApp();
})();
</script>
</body>
</html>
